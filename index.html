<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OR Chat">
<meta name="theme-color" content="#0c0c1a">
<title>OpenRouter Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(160deg, #0c0c1a 0%, #12122a 50%, #0a0a18 100%);
    color: #e0e0f0;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(108,92,231,0.2); border-radius: 3px; }
  textarea, input, button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #555568; }

  /* API Key Screen */
  .api-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .api-card {
    width: 100%; max-width: 420px; padding: 44px 36px; border-radius: 20px;
    background: linear-gradient(160deg, rgba(30,30,60,0.85), rgba(18,18,38,0.95));
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .api-logo {
    width:60px; height:60px; border-radius:16px; margin:0 auto 18px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    display:flex; align-items:center; justify-content:center; font-size:26px;
    box-shadow: 0 8px 32px rgba(108,92,231,0.35);
  }
  .api-card h1 { color:#f0f0f8; font-size:24px; font-weight:700; letter-spacing:-0.5px; text-align:center; }
  .api-card .sub { color:#8888aa; font-size:13px; margin-top:8px; line-height:1.5; text-align:center; }
  .api-card label { display:block; color:#aaaacc; font-size:11px; font-weight:600; margin:24px 0 8px; text-transform:uppercase; letter-spacing:1px; }
  .api-card input {
    width:100%; padding:13px 15px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);
    background:rgba(10,10,25,0.7); color:#e0e0f0; font-size:15px; outline:none; transition:border-color 0.2s;
  }
  .api-card input:focus { border-color: rgba(108,92,231,0.5); }
  .api-btn {
    width:100%; padding:13px; margin-top:14px; border-radius:12px; border:none;
    font-size:15px; font-weight:600; cursor:pointer; transition:all 0.25s;
  }
  .api-btn.active { background:linear-gradient(135deg,#6c5ce7,#a29bfe); color:#fff; box-shadow:0 6px 24px rgba(108,92,231,0.3); }
  .api-btn.inactive { background:rgba(60,60,80,0.5); color:#666; cursor:not-allowed; }
  .api-card .hint { color:#555568; font-size:11px; text-align:center; margin-top:14px; line-height:1.5; }

  /* Main Layout */
  .app-layout { display:flex; height:100vh; width:100vw; overflow:hidden; }

  /* Sidebar */
  .sidebar {
    width: 272px; min-width: 272px; background: rgba(12,12,26,0.95);
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; transition: all 0.3s ease; overflow: hidden;
  }
  .sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
  .sidebar-header { padding:14px 14px 6px; display:flex; align-items:center; gap:10px; }
  .sidebar-logo {
    width:32px; height:32px; border-radius:9px; flex-shrink:0;
    background:linear-gradient(135deg,#6c5ce7,#a29bfe);
    display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .sidebar-title { color:#e0e0f0; font-weight:700; font-size:15px; letter-spacing:-0.3px; }
  .new-chat-btn {
    margin:6px 10px; padding:10px 12px; border-radius:10px;
    border:1px dashed rgba(108,92,231,0.4); background:rgba(108,92,231,0.08);
    color:#a29bfe; font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:all 0.2s;
  }
  .new-chat-btn:hover { background:rgba(108,92,231,0.15); }
  .chat-list { flex:1; overflow-y:auto; padding:4px 6px; }
  .chat-item {
    padding:9px 11px; border-radius:8px; margin-bottom:2px; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; transition:all 0.15s;
    border:1px solid transparent;
  }
  .chat-item:hover { background:rgba(255,255,255,0.03); }
  .chat-item.active { background:rgba(108,92,231,0.15); border-color:rgba(108,92,231,0.25); }
  .chat-item-title { color:#9999b0; font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-item.active .chat-item-title { color:#d0d0f0; }
  .chat-item-meta { color:#55556a; font-size:11px; margin-top:2px; }
  .chat-delete {
    background:none; border:none; color:#55556a; cursor:pointer; padding:2px 6px;
    border-radius:4px; font-size:14px; flex-shrink:0; transition:color 0.15s; opacity:0;
  }
  .chat-item:hover .chat-delete { opacity:1; }
  .chat-delete:hover { color:#ff6b6b; }

  /* Main Panel */
  .main-panel { flex:1; display:flex; flex-direction:column; min-width:0; }
  .header {
    padding:10px 16px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    background:rgba(12,12,26,0.6); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .toggle-btn {
    background:none; border:none; color:#8888aa; cursor:pointer;
    font-size:18px; padding:4px 8px; border-radius:6px;
  }
  .signout-btn {
    background:rgba(255,100,100,0.08); border:1px solid rgba(255,100,100,0.15);
    color:#ff8888; padding:5px 12px; border-radius:8px; cursor:pointer;
    font-size:12px; font-weight:500; transition:all 0.2s; margin-left:auto;
  }

  /* Model Selector */
  .model-btn {
    display:flex; align-items:center; gap:7px; padding:6px 12px;
    border-radius:10px; border:1px solid rgba(255,255,255,0.08);
    background:rgba(20,20,40,0.6); color:#d0d0e8; font-size:13px;
    font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .model-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .model-dropdown {
    position:absolute; top:calc(100% + 6px); left:0; width:270px;
    background:rgba(18,18,38,0.98); border:1px solid rgba(255,255,255,0.1);
    border-radius:14px; padding:6px 0; z-index:100;
    box-shadow:0 20px 60px rgba(0,0,0,0.5); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    max-height:380px; overflow-y:auto;
  }
  .model-group-label {
    padding:7px 14px 3px; font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:1.2px;
  }
  .model-option {
    display:block; width:100%; padding:8px 14px; border:none; text-align:left;
    background:transparent; color:#aaaacc; font-size:13px; cursor:pointer; transition:background 0.15s;
  }
  .model-option:hover { background:rgba(255,255,255,0.04); }
  .model-option.selected { background:rgba(108,92,231,0.12); color:#c0b8ff; }

  /* Messages */
  .messages-area { flex:1; overflow-y:auto; padding:16px 18px; }
  .empty-state {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100%; opacity:0.5; text-align:center;
  }
  .empty-icon { font-size:44px; margin-bottom:14px; }
  .empty-title { font-size:18px; font-weight:600; color:#a0a0c0; }
  .empty-sub { font-size:13px; color:#666688; margin-top:6px; }
  .msg-row { display:flex; padding:4px 0; animation:fadeIn 0.25s ease; }
  .msg-row.user { justify-content:flex-end; }
  .msg-row.assistant { justify-content:flex-start; }
  .msg-bubble {
    max-width:80%; padding:11px 15px; font-size:14px; line-height:1.65; word-break:break-word;
  }
  .msg-bubble.user {
    border-radius:16px 16px 4px 16px;
    background:linear-gradient(135deg,#6c5ce7,#7c6cf7);
    box-shadow:0 4px 16px rgba(108,92,231,0.2);
  }
  .msg-bubble.assistant {
    border-radius:16px 16px 16px 4px;
    background:rgba(30,30,55,0.7); border:1px solid rgba(255,255,255,0.06);
  }
  .msg-bubble pre {
    background:#1a1a2e; padding:12px 14px; border-radius:8px; overflow-x:auto;
    font-size:13px; line-height:1.5; margin:8px 0; border:1px solid #2a2a4a;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .msg-bubble code {
    background:#1a1a2e; padding:2px 5px; border-radius:4px; font-size:13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .msg-bubble pre code { background:none; padding:0; }
  .typing-dots { display:flex; gap:5px; padding:8px 0 0 8px; }
  .typing-dot {
    width:7px; height:7px; border-radius:50%; background:#6c5ce7;
  }

  /* Input */
  .input-area { padding:10px 16px 14px; border-top:1px solid rgba(255,255,255,0.04); }
  .input-wrapper {
    display:flex; gap:8px; align-items:flex-end;
    background:rgba(20,20,42,0.6); border:1px solid rgba(255,255,255,0.08);
    border-radius:16px; padding:9px 12px; transition:border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color:rgba(108,92,231,0.3); }
  .input-wrapper textarea {
    flex:1; background:transparent; border:none; outline:none;
    color:#e0e0f0; font-size:14px; resize:none; padding:4px 0;
    line-height:1.5; max-height:120px; overflow-y:auto;
  }
  .send-btn {
    width:36px; height:36px; border-radius:10px; border:none; flex-shrink:0;
    font-size:16px; display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; cursor:pointer;
  }
  .send-btn.active {
    background:linear-gradient(135deg,#6c5ce7,#a29bfe); color:#fff;
    box-shadow:0 4px 16px rgba(108,92,231,0.3);
  }
  .send-btn.inactive { background:rgba(50,50,70,0.5); color:#555; cursor:not-allowed; }
  .send-btn.stop {
    background:linear-gradient(135deg,#e74c3c,#ff6b6b); color:#fff;
    box-shadow:0 4px 16px rgba(231,76,60,0.3); cursor:pointer;
  }
  .footer-text { text-align:center; margin-top:7px; font-size:11px; color:#44445a; }

  /* Mobile */
  @media (max-width: 700px) {
    .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:200; width:280px; min-width:280px; }
    .sidebar.collapsed { width:0; min-width:0; }
    .sidebar-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:199;
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    }
    .msg-bubble { max-width:88%; }
    .api-card { padding:36px 28px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
var e = React.createElement;
var useState = React.useState;
var useRef = React.useRef;
var useEffect = React.useEffect;
var useCallback = React.useCallback;

var MODELS = [
  { id:"openai/gpt-4o", name:"GPT-4o", p:"OpenAI" },
  { id:"openai/gpt-4o-mini", name:"GPT-4o Mini", p:"OpenAI" },
  { id:"openai/gpt-4.1", name:"GPT-4.1", p:"OpenAI" },
  { id:"openai/gpt-4.1-mini", name:"GPT-4.1 Mini", p:"OpenAI" },
  { id:"anthropic/claude-sonnet-4", name:"Claude Sonnet 4", p:"Anthropic" },
  { id:"anthropic/claude-3.5-sonnet", name:"Claude 3.5 Sonnet", p:"Anthropic" },
  { id:"anthropic/claude-3.5-haiku", name:"Claude 3.5 Haiku", p:"Anthropic" },
  { id:"google/gemini-2.5-pro-preview", name:"Gemini 2.5 Pro", p:"Google" },
  { id:"google/gemini-2.0-flash-001", name:"Gemini 2.0 Flash", p:"Google" },
  { id:"meta-llama/llama-4-maverick", name:"Llama 4 Maverick", p:"Meta" },
  { id:"meta-llama/llama-3.3-70b-instruct", name:"Llama 3.3 70B", p:"Meta" },
  { id:"deepseek/deepseek-chat-v3-0324", name:"DeepSeek V3", p:"DeepSeek" },
  { id:"deepseek/deepseek-r1", name:"DeepSeek R1", p:"DeepSeek" },
  { id:"mistralai/mistral-large-2411", name:"Mistral Large", p:"Mistral" },
  { id:"qwen/qwen-2.5-72b-instruct", name:"Qwen 2.5 72B", p:"Qwen" },
];

var PCOLORS = { OpenAI:"#10a37f", Anthropic:"#d4a27f", Google:"#4285f4", Meta:"#0668E1", DeepSeek:"#536af0", Mistral:"#f77b2e", Qwen:"#6c5ce7" };

var STORAGE_KEY = "or-chat-history";
function saveChats(chats) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch(e){} }
function loadChats() { try { var d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; } catch(e){ return []; } }

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function renderMD(text) {
  if (!text) return "";
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g, function(_,l,c){ return '<pre><code>'+c.trim()+'</code></pre>'; })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/^### (.+)$/gm, '<h3 style="font-size:15px;font-weight:700;margin:12px 0 5px">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 style="font-size:17px;font-weight:700;margin:14px 0 6px">$1</h2>')
    .replace(/^# (.+)$/gm, '<h1 style="font-size:19px;font-weight:700;margin:16px 0 7px">$1</h1>')
    .replace(/\n/g, "<br/>");
}

function ApiKeyScreen(props) {
  var s = useState(""); var key = s[0]; var setKey = s[1];
  var ref = useRef(null);
  useEffect(function(){ if(ref.current) ref.current.focus(); },[]);
  return e("div",{className:"api-screen"},
    e("div",{className:"api-card"},
      e("div",{className:"api-logo"},"\u26A1"),
      e("h1",null,"OpenRouter Chat"),
      e("p",{className:"sub"},"Access GPT-4o, Claude, Gemini, Llama & more through a single interface"),
      e("label",null,"API Key"),
      e("input",{ref:ref, type:"password", value:key, placeholder:"sk-or-v1-...",
        onChange:function(ev){setKey(ev.target.value);},
        onKeyDown:function(ev){if(ev.key==="Enter"&&key.trim()) props.onSubmit(key.trim());}
      }),
      e("button",{className:"api-btn "+(key.trim()?"active":"inactive"), disabled:!key.trim(),
        onClick:function(){if(key.trim()) props.onSubmit(key.trim());}
      },"Start Chatting \u2192"),
      e("p",{className:"hint"},"Your key stays in this browser session only.",e("br"),"Get one at openrouter.ai/keys")
    )
  );
}

function ModelSelector(props) {
  var s = useState(false); var open = s[0]; var setOpen = s[1];
  var ref = useRef(null);
  var cur = MODELS.find(function(m){return m.id===props.model;}) || {name:props.model.split("/").pop(),p:"Custom"};

  useEffect(function(){
    var h = function(ev){ if(ref.current && !ref.current.contains(ev.target)) setOpen(false); };
    document.addEventListener("mousedown",h);
    return function(){ document.removeEventListener("mousedown",h); };
  },[]);

  var grouped = {};
  MODELS.forEach(function(m){ (grouped[m.p]=grouped[m.p]||[]).push(m); });

  return e("div",{ref:ref, style:{position:"relative"}},
    e("button",{className:"model-btn", onClick:function(){setOpen(!open);}},
      e("span",{className:"model-dot", style:{background:PCOLORS[cur.p]||"#888", boxShadow:"0 0 8px "+(PCOLORS[cur.p]||"#888")+"44"}}),
      cur.name,
      e("span",{style:{fontSize:10,opacity:0.5,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}},"\u25BC")
    ),
    open ? e("div",{className:"model-dropdown"},
      Object.keys(grouped).map(function(provider){
        return e("div",{key:provider},
          e("div",{className:"model-group-label",style:{color:PCOLORS[provider]||"#888"}},provider),
          grouped[provider].map(function(m){
            return e("button",{key:m.id, className:"model-option"+(m.id===props.model?" selected":""),
              onClick:function(){props.onChange(m.id);setOpen(false);}
            },m.name);
          })
        );
      })
    ) : null
  );
}

function Sidebar(props) {
  return e("div",{className:"sidebar"+(props.collapsed?" collapsed":"")},
    e("div",{className:"sidebar-header"},
      e("div",{className:"sidebar-logo"},"\u26A1"),
      e("span",{className:"sidebar-title"},"OR Chat")
    ),
    e("button",{className:"new-chat-btn",onClick:props.onNew},"+ New Chat"),
    e("div",{className:"chat-list"},
      props.chats.map(function(c){
        return e("div",{key:c.id, className:"chat-item"+(c.id===props.activeChat?" active":""),
          onClick:function(){props.onSelect(c.id);}
        },
          e("div",{style:{overflow:"hidden",flex:1,minWidth:0}},
            e("div",{className:"chat-item-title"},c.title),
            e("div",{className:"chat-item-meta"},
              c.messages.filter(function(m){return m.role==="user";}).length+" msgs \u00B7 "+c.model.split("/").pop()
            )
          ),
          props.chats.length>1 ? e("button",{className:"chat-delete",
            onClick:function(ev){ev.stopPropagation();props.onDelete(c.id);}
          },"\u00D7") : null
        );
      })
    )
  );
}

function Message(props) {
  var msg = props.msg;
  var isUser = msg.role === "user";
  return e("div",{className:"msg-row "+(isUser?"user":"assistant")},
    e("div",{className:"msg-bubble "+(isUser?"user":"assistant")},
      isUser ? msg.content : e("div",{dangerouslySetInnerHTML:{__html:renderMD(msg.content)}})
    )
  );
}

function App() {
  var s1=useState(null); var apiKey=s1[0]; var setApiKey=s1[1];
  var saved=loadChats();
  var s2=useState(saved); var chats=s2[0]; var setChats=s2[1];
  var s3=useState(saved.length>0?saved[0].id:null); var activeChatId=s3[0]; var setActiveChatId=s3[1];
  var s4=useState(""); var input=s4[0]; var setInput=s4[1];
  var s5=useState(false); var streaming=s5[0]; var setStreaming=s5[1];
  var s6=useState(window.innerWidth>700); var sidebarOpen=s6[0]; var setSidebarOpen=s6[1];
  var endRef=useRef(null); var inputRef=useRef(null); var abortRef=useRef(null);
  var isMobile = window.innerWidth <= 700;

  var activeChat = chats.find(function(c){return c.id===activeChatId;});

  function createChat(mid) {
    var nc = { id:gid(), title:"New Chat", model:mid||"openai/gpt-4o", messages:[], createdAt:Date.now() };
    setChats(function(p){return [nc].concat(p);});
    setActiveChatId(nc.id);
    return nc;
  }

  var updateChat = useCallback(function(cid,fn){
    setChats(function(p){return p.map(function(c){return c.id===cid?fn(c):c;});});
  },[]);

  useEffect(function(){ saveChats(chats); },[chats]);
  useEffect(function(){if(endRef.current) endRef.current.scrollIntoView({behavior:"smooth"});},[activeChat?.messages?.length]);
  useEffect(function(){if(!streaming && inputRef.current) inputRef.current.focus();},[streaming,activeChatId]);

  function stopGeneration() {
    if(abortRef.current) { abortRef.current.abort(); abortRef.current=null; }
  }

  async function sendMessage() {
    if(!input.trim()||streaming||!activeChat) return;
    var userMsg={role:"user",content:input.trim()};
    var chatId=activeChat.id;
    var first=activeChat.messages.length===0;

    updateChat(chatId,function(c){return Object.assign({},c,{
      messages:c.messages.concat([userMsg]),
      title:first?userMsg.content.slice(0,40)+(userMsg.content.length>40?"\u2026":""):c.title
    });});
    setInput(""); setStreaming(true);

    var aid=gid();
    updateChat(chatId,function(c){return Object.assign({},c,{
      messages:c.messages.concat([{role:"assistant",content:"",id:aid}])
    });});

    try {
      abortRef.current=new AbortController();
      var allMsgs=activeChat.messages.concat([userMsg]).map(function(m){return{role:m.role,content:m.content};});
      var res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
        method:"POST",
        headers:{"Authorization":"Bearer "+apiKey,"Content-Type":"application/json","HTTP-Referer":window.location.origin},
        body:JSON.stringify({model:activeChat.model,messages:allMsgs,stream:true}),
        signal:abortRef.current.signal
      });
      if(!res.ok){var ed=await res.json().catch(function(){return{};}); throw new Error(ed.error?.message||"API error "+res.status);}

      var reader=res.body.getReader(); var decoder=new TextDecoder(); var buffer=""; var fullText="";
      while(true){
        var result=await reader.read();
        if(result.done) break;
        buffer+=decoder.decode(result.value,{stream:true});
        var lines=buffer.split("\n"); buffer=lines.pop();
        for(var i=0;i<lines.length;i++){
          var tr=lines[i].trim();
          if(!tr.startsWith("data:")) continue;
          var d=tr.slice(5).trim();
          if(d==="[DONE]") continue;
          try{var j=JSON.parse(d);var delta=j.choices?.[0]?.delta?.content;
            if(delta){fullText+=delta;var cap=fullText;
              updateChat(chatId,function(c){return Object.assign({},c,{
                messages:c.messages.map(function(m){return m.id===aid?Object.assign({},m,{content:cap}):m;})
              });});
            }
          }catch(pe){}
        }
      }
    } catch(err) {
      if(err.name!=="AbortError") {
        updateChat(chatId,function(c){return Object.assign({},c,{
          messages:c.messages.map(function(m){return m.id===aid?Object.assign({},m,{content:"\u26A0\uFE0F Error: "+err.message}):m;})
        });});
      }
    } finally { abortRef.current=null; setStreaming(false); }
  }

  if(!apiKey) return e(ApiKeyScreen,{onSubmit:function(k){setApiKey(k);if(chats.length===0)createChat();}});

  return e("div",{className:"app-layout"},
    isMobile && sidebarOpen ? e("div",{className:"sidebar-overlay",onClick:function(){setSidebarOpen(false);}}) : null,
    e(Sidebar,{
      chats:chats, activeChat:activeChatId, collapsed:!sidebarOpen,
      onSelect:function(id){setActiveChatId(id); if(isMobile) setSidebarOpen(false);},
      onNew:function(){createChat(); if(isMobile) setSidebarOpen(false);},
      onDelete:function(id){
        var rem=chats.filter(function(c){return c.id!==id;});
        if(rem.length===0){createChat();}else{setChats(rem);if(id===activeChatId)setActiveChatId(rem[0].id);}
      }
    }),
    e("div",{className:"main-panel"},
      e("div",{className:"header"},
        e("button",{className:"toggle-btn",onClick:function(){setSidebarOpen(function(p){return!p;});}},sidebarOpen?"\u25C1":"\u2630"),
        activeChat ? e(ModelSelector,{model:activeChat.model,onChange:function(m){updateChat(activeChatId,function(c){return Object.assign({},c,{model:m});});}}) : null,
        e("button",{className:"signout-btn",onClick:function(){setApiKey(null);setChats([]);localStorage.removeItem(STORAGE_KEY);}},"Sign Out")
      ),
      e("div",{className:"messages-area"},
        activeChat && activeChat.messages.length===0 ?
          e("div",{className:"empty-state"},
            e("div",{className:"empty-icon"},"\u26A1"),
            e("div",{className:"empty-title"},"Start a conversation"),
            e("div",{className:"empty-sub"},"Using "+((MODELS.find(function(m){return m.id===activeChat?.model;})||{}).name||activeChat?.model))
          ) : null,
        activeChat ? activeChat.messages.map(function(msg,i){return e(Message,{key:i,msg:msg});}) : null,
        streaming ? e("div",{className:"typing-dots"},
          [0,1,2].map(function(i){return e("div",{key:i,className:"typing-dot",style:{animation:"pulse 1.2s ease-in-out "+(i*0.2)+"s infinite"}});})
        ) : null,
        e("div",{ref:endRef})
      ),
      e("div",{className:"input-area"},
        e("div",{className:"input-wrapper"},
          e("textarea",{ref:inputRef, value:input, rows:1, placeholder:"Message\u2026", disabled:streaming,
            onChange:function(ev){setInput(ev.target.value);},
            onKeyDown:function(ev){if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();sendMessage();}},
            onInput:function(ev){ev.target.style.height="auto";ev.target.style.height=Math.min(ev.target.scrollHeight,120)+"px";}
          }),
          streaming ?
            e("button",{className:"send-btn stop", onClick:stopGeneration},"\u25A0") :
            e("button",{className:"send-btn "+(input.trim()?"active":"inactive"),
              disabled:!input.trim(), onClick:sendMessage},"\u2191")
        ),
        e("div",{className:"footer-text"},"Powered by OpenRouter \u00B7 Responses may be inaccurate")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
